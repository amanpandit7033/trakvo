{% if full_width %}
<div class="pt-4 flex flex-col space-y-3 border-t border-brand-hairline">
    <button type="submit" class="w-full bg-brand-brass hover:brightness-95 text-brand-ink font-medium py-2 px-6 rounded-md transition-all shadow-sm">
        {{ submit_text|default:"Save" }}
    </button>
    {% if cancel_url %}
    <a href="{{ cancel_url }}" class="w-full text-center text-gray-500 hover:text-brand-ink font-medium transition-colors">Cancel</a>
    {% endif %}
</div>
{% else %}
<div class="pt-4 flex items-center space-x-4 border-t border-brand-hairline">
    <button type="submit" class="bg-brand-brass hover:brightness-95 text-brand-ink font-medium py-2 px-6 rounded-md transition-all shadow-sm">
        {{ submit_text|default:"Save" }}
    </button>
    {% if cancel_url %}
    <a href="{{ cancel_url }}" class="text-gray-500 hover:text-brand-ink font-medium transition-colors">Cancel</a>
    {% endif %}
</div>
{% endif %}
